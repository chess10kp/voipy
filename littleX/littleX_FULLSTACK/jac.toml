[project]
name = "voipy"
version = "1.0.0"
description = "Voipy - A Twitter-like social app built with Jac"
entry-point = "main.jac"

[jacpack]
name = "voipy"
description = "Voipy social app template"

[dependencies]
numpy = ">=1.24.0"
scikit-learn = ">=1.3.0"
boto3 = "~=1.42"
elevenlabs = ">=1.0.0"
sounddevice = ">=0.4.6"
scipy = ">=1.11.0"
keyboard = ">=0.13.5"
python-dotenv = ">=1.0.0"
mcp = ">=1.0.0"
httpx = ">=0.25.0"
playwright = ">=1.40.0"
twilio = ">=9.0.0"
flask = ">=3.0.0"

[dependencies.npm]
jac-client-node = "1.0.7"
lucide-react = "^0.469.0"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client.app_meta_data]
title = "Voipy"
description = "A decentralized social platform built with Jac"
keywords = "voipy social jac jaseci"
author = "Jaseci Labs"
theme_color = "#f97316"
icon = "/static/assets/voipy-logo.png"
